{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Departments</h3>
                </div>
                <div class="col-auto float-right ml-auto">
                    <a href="{% url 'add_departement' %}" class="btn btn-primary"><i class="fas fa-plus"></i></a>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card card-table">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-center mb-0">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Head of Dept</th>
                                        <th class="text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for dept in depts %}
                                    <tr>
                                        <td>{{ dept.department_id }}</td>
                                        <td>{{ dept.name }}</td>
                                        <td>{{ dept.head_of_department }}</td>
                                        <td class="text-right">
                                            <div class="actions">
                                                {% for departement in depts %}
                                 <a href="{% url 'edit_department' departement.id %}">Edit</a>
                                            {% endfor %}
                                                <a href="{% url 'delete_departement' dept.pk %}" class="btn btn-sm bg-danger-light" onclick="return confirm('Are you sure you want to delete this department?')">
                                                    <i class="fas fa-trash"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                    {% empty %}
                                    <tr><td colspan="4" class="text-center">No Departments Found.</td></tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
