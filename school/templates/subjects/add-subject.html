{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Add Subject</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'subject_list' %}">Subjects</a></li>
                        <li class="breadcrumb-item active">Add Subject</li>
                    </ul>
                </div>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST" action="{% url 'add_subject' %}">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title"><span>Subject Information</span></h5>
                                </div>
                                
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Subject ID <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="subject_id" placeholder="e.g. MAT101" required>
                                    </div>
                                </div>
                                
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Subject Name <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="subject_name" placeholder="Enter Subject Name" required>
                                    </div>
                                </div>

                  <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Department</label>
                                        <select class="form-control" name="department" required>
                                            <option value="">Select Department</option>
                                            {% for d in depts %}
                                                <option value="{{ d.id }}">{{ d.name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>              
                           
                                <div class="col-12 col-sm-6">
                                    <div class="form-group      
">
                                        <label>Teacher</label>
                                        <select class="form-control" name="teacher" required>
                                            <option value="">Select Teacher</option>
                                            {% for t in teachers %}
                                                <option value="{{ t.id }}">{{ t.first_name }} {{ t.last_name }}</option>
                                            {% endfor %}
                                        </select>

                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary">Save Subject</button>
                                    <a href="{% url 'subject_list' %}" class="btn btn-secondary">Cancel</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
